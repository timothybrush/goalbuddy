name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify package
        run: |
          npm run check
          npm run pack:dry-run

      - name: Check npm publish status
        id: npm_status
        run: |
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view goalbuddy version 2>/dev/null || true)"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "published_version=$published_version" >> "$GITHUB_OUTPUT"
          if [ "$package_version" = "$published_version" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "goalbuddy@$package_version is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.npm_status.outputs.already_published != 'true'
        run: npm publish
